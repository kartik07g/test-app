name: Deploy app to ec2

on:
  push:
    branches : ['main']

jobs:
    deploy:
      runs-on : ubuntu-latest
    
      steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: docker hub login
          uses: docker/login-action@v3
          with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}
        
        - name: Build and Push
          uses: docker/build-push-action@v5
          with:
            context: ./test-app-backend
            push: true
            tags: ${{secrets.DOCKER_USERNAME}}/test-app-backend:latest

        - name: deploy backend to ec2
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{secrets.Ec2_HOST}}
            username: ${{secrets.Ec2_USER}}
            key: ${{secrets.Ec2_SSH_KEY}}
            script: |
              sudo docker pull ${{secrets.DOCKER_USERNAME}}/test-app-backend:latest

              sudo docker container stop test-app-backend || true

              sudo docker container rm test-app-backend || true

              sudo docker run -d --name test-app-backend -p 8000:8000 ${{secrets.DOCKER_USERNAME}}/test-app-backend:latest 
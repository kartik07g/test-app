name: Deploy app to ec2

on:
  push:
    branches : ['main']

jobs:
    deploy:
      runs-on : ubuntu-latest
    
      steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: docker hub login
          uses: docker/login-action@v3
          with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}
        
        - name: Build and Push Backend
          uses: docker/build-push-action@v5
          with:
            context: ./test-app-backend
            push: true
            tags: ${{secrets.DOCKER_USERNAME}}/test-app-backend:latest

        - name: Build and Push Frontend
          uses: docker/build-push-action@v5
          with:
            context: ./test-app-frontend
            file: ./test-app-frontend/Dockerfile.prod
            push: true
            tags: ${{secrets.DOCKER_USERNAME}}/test-app-frontend:latest
            build-args: |
              VITE_API_URL=http://${{secrets.EC2_HOST}}:8000

        - name: deploy backend to ec2
          uses: appleboy/ssh-action@v1.0.3 
          with:
            host: ${{secrets.EC2_HOST}}
            username: ${{secrets.EC2_USER}}
            key: ${{secrets.EC2_SSH_KEY}}
            script: |
              echo "logging in to docker hub..."
              sudo docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}

              sudo docker network create app-network || true

              echo "pulling image..."
              sudo docker pull ${{secrets.DOCKER_USERNAME}}/test-app-backend:latest

              sudo docker container stop test-app-backend || true 
              sudo docker container rm test-app-backend || true

              sudo docker run -d --name test-app-backend --network app-network -p 8000:8000 ${{secrets.DOCKER_USERNAME}}/test-app-backend:latest

        - name: deploy frontend to ec2
          uses: appleboy/ssh-action@v1.0.3 
          with:
            host: ${{secrets.EC2_HOST}}
            username: ${{secrets.EC2_USER}}
            key: ${{secrets.EC2_SSH_KEY}}
            script: |
              echo "logging in to docker hub..."
              sudo docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}

              echo "pulling frontend image..."
              sudo docker pull ${{secrets.DOCKER_USERNAME}}/test-app-frontend:latest

              sudo docker container stop test-app-frontend || true 
              sudo docker container rm test-app-frontend || true

              sudo docker run -d --name test-app-frontend --network app-network -p 3000:80 ${{secrets.DOCKER_USERNAME}}/test-app-frontend:latest
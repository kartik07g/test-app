version: "3.9"

services:
  test-app-backend:
    build: 
      context: ./test-app-backend
      dockerfile: Dockerfile
    image: test-app-backend:latest
    container_name: test-app-backend
    ports: 
      - "8000:8000"
    volumes:
     - ./test-app-backend:/app
    command: gunicorn --bind 0.0.0.0:8000 app:app --reload